server {
    listen 80;
    listen [::]:80;
    server_name portal.sspay.com;

    root __APP_DIR__/dist;
    index index.html;

    # Cache hashed Vite assets aggressively
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every other path serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
